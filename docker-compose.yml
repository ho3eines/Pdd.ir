version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pdd-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pdd@123456"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ./sql-data:/var/opt/mssql
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Pdd@123456" -C -Q "SELECT 1" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Pdd@123456" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdd-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=pdd;User Id=sa;Password=Pdd@123456;TrustServerCertificate=True;
      - ConnectionString=Server=db;Database=pdd;User Id=sa;Password=Pdd@123456;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy

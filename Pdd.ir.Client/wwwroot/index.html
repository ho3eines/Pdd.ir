<!DOCTYPE html>
<html dir="ltr" lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D6EFD" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="Pdd.ir | Software Engineering" />
    <title>Pdd.ir | نرم‌افزار مهندسی</title>

    <base href="/" />
    <link href="lib/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="lib/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />

    <style>
        /* ============================================================
           COLOR TOKENS
           ============================================================ */
        :root {
            --pdd-bg-1: #0B0F17;
            --pdd-bg-2: #050812;
            --pdd-bg-3: #16233b;
            --pdd-primary: #0D6EFD;
            --pdd-secondary: #FFB020;
            --pdd-accent: #00E0FF;
            --pdd-text: #E5E7EB;
            --pdd-text-muted: #9CA3AF;
            --pdd-glass: rgba(255, 255, 255, 0.05);
            --pdd-glass-border: rgba(255, 255, 255, 0.1);
            --pdd-warm: #FFB51B;
            --pdd-cool: #0879B8;
        }
        [data-theme="light"] {
            --pdd-bg-1: #F7F9FC;
            --pdd-bg-2: #E6EEF7;
            --pdd-bg-3: #FFFFFF;
            --pdd-primary: #0D6EFD;
            --pdd-secondary: #FF8A00;
            --pdd-accent: #00B4DB;
            --pdd-text: #1F2937;
            --pdd-text-muted: #6B7280;
            --pdd-glass: rgba(255, 255, 255, 0.7);
            --pdd-glass-border: rgba(13, 110, 253, 0.15);
        }
        body {
            margin: 0;
            font-family: 'Inter', 'Vazirmatn', sans-serif;
            background: var(--pdd-bg-1);
            color: var(--pdd-text);
            overflow-x: hidden;
        }

        /* ============================================================
           SPLASH ROOT
           ============================================================ */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(13, 110, 253, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(255, 176, 32, 0.14) 0%, transparent 55%),
                radial-gradient(circle at center, var(--pdd-bg-3) 0%, var(--pdd-bg-1) 60%, var(--pdd-bg-2) 100%);
            transition: opacity 0.6s cubic-bezier(0.65, 0, 0.35, 1), visibility 0.6s ease;
        }
        #splash-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Animated conic gradient layer (slow rotate) */
        #splash-screen::before {
            content: "";
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                transparent 0%,
                rgba(13, 110, 253, 0.1) 25%,
                transparent 50%,
                rgba(255, 176, 32, 0.1) 75%,
                transparent 100%
            );
            animation: rotate 18s linear infinite;
            filter: blur(60px);
            pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Grain texture */
        #splash-screen::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
            opacity: 0.04;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* ============================================================
           PARTICLE LAYER (Canvas)
           ============================================================ */
        #splash-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* ============================================================
           LOGO STAGE
           ============================================================ */
        .logo-stage {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* Conic glow ring */
        .glow-ring {
            position: absolute;
            inset: -25px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                var(--pdd-primary) 0deg,
                transparent 90deg,
                var(--pdd-secondary) 180deg,
                transparent 270deg,
                var(--pdd-primary) 360deg
            );
            filter: blur(35px);
            opacity: 0;
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* Sharp inner ring */
        .glow-ring-inner {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid transparent;
            background: conic-gradient(
                from 0deg,
                var(--pdd-primary) 0deg,
                transparent 80deg,
                var(--pdd-secondary) 170deg,
                transparent 250deg,
                var(--pdd-primary) 360deg
            ) border-box;
            -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            animation: spin 6s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Pulse waves from logo */
        .pulse-wave {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid var(--pdd-primary);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
        }

        /* Logo SVG container */
        .logo-svg-wrap {
            position: relative;
            z-index: 3;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.4) rotate(-8deg);
            filter:
                drop-shadow(0 0 24px rgba(13, 110, 253, 0.5))
                drop-shadow(0 0 48px rgba(255, 181, 27, 0.3));
        }

        /* SVG path styles — exact match to original logo */
        .logo-svg-wrap .brand-outline {
            fill: white;
            stroke: #1D1D1D;
            stroke-width: 5;
            stroke-linejoin: round;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
        }
        .logo-svg-wrap .brand-fill-yellow {
            fill: #FFB51B;
            stroke: #1D1D1D;
            stroke-width: 5;
            stroke-linejoin: round;
            opacity: 0;
        }
        .logo-svg-wrap .brand-fill-blue {
            fill: #0879B8;
            stroke: #1D1D1D;
            stroke-width: 5;
            stroke-linejoin: round;
            opacity: 0;
        }
        .logo-svg-wrap .brand-fill-white {
            fill: white;
            stroke: #1D1D1D;
            stroke-width: 5;
            stroke-linejoin: round;
            opacity: 0;
        }

        /* Light sweep over the logo */
        .light-sweep {
            position: absolute;
            top: 0;
            left: -120%;
            width: 80%;
            height: 100%;
            background: linear-gradient(
                100deg,
                transparent 30%,
                rgba(255, 255, 255, 0.35) 50%,
                transparent 70%
            );
            transform: skewX(-20deg);
            pointer-events: none;
            z-index: 4;
            opacity: 0;
        }

        /* Logo reflection (mirrored) */
        .logo-reflection {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%) scaleY(-1);
            width: 160px;
            height: 80px;
            opacity: 0;
            background: linear-gradient(
                to bottom,
                rgba(13, 110, 253, 0.18) 0%,
                transparent 80%
            );
            filter: blur(10px);
            pointer-events: none;
            border-radius: 50%;
        }

        /* ============================================================
           BRAND TEXT
           ============================================================ */
        .brand-text {
            margin-top: 50px;
            text-align: center;
            position: relative;
            z-index: 5;
            opacity: 0;
            transform: translateY(20px);
        }
        .brand-name {
            font-family: 'Inter', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 6px;
            background: linear-gradient(135deg, var(--pdd-text) 0%, var(--pdd-accent) 50%, var(--pdd-secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .brand-tagline {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--pdd-text-muted);
            margin: 0;
        }

        /* ============================================================
           LOADING BAR (glassmorphism)
           ============================================================ */
        .loading-wrap {
            margin-top: 32px;
            width: 220px;
            height: 3px;
            background: var(--pdd-glass);
            border: 1px solid var(--pdd-glass-border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            z-index: 5;
            opacity: 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .loading-bar {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--pdd-primary) 0%, var(--pdd-accent) 50%, var(--pdd-secondary) 100%);
            border-radius: 20px;
            width: 0%;
            box-shadow: 0 0 12px var(--pdd-primary);
        }

        /* ============================================================
           CORNER MARKS (premium tech detail)
           ============================================================ */
        .corner {
            position: absolute;
            width: 32px;
            height: 32px;
            opacity: 0;
            pointer-events: none;
        }
        .corner::before, .corner::after {
            content: "";
            position: absolute;
            background: linear-gradient(90deg, var(--pdd-accent), transparent);
        }
        .corner::before { width: 100%; height: 1px; }
        .corner::after  { width: 1px; height: 100%; }
        .corner.tl { top: 24px; left: 24px; }
        .corner.tl::before { top: 0; left: 0; }
        .corner.tl::after  { top: 0; left: 0; background: linear-gradient(180deg, var(--pdd-accent), transparent); }
        .corner.tr { top: 24px; right: 24px; }
        .corner.tr::before { top: 0; right: 0; background: linear-gradient(-90deg, var(--pdd-accent), transparent); }
        .corner.tr::after  { top: 0; right: 0; background: linear-gradient(180deg, var(--pdd-accent), transparent); }
        .corner.bl { bottom: 24px; left: 24px; }
        .corner.bl::before { bottom: 0; left: 0; background: linear-gradient(90deg, var(--pdd-secondary), transparent); }
        .corner.bl::after  { bottom: 0; left: 0; background: linear-gradient(0deg, var(--pdd-secondary), transparent); }
        .corner.br { bottom: 24px; right: 24px; }
        .corner.br::before { bottom: 0; right: 0; background: linear-gradient(-90deg, var(--pdd-secondary), transparent); }
        .corner.br::after  { bottom: 0; right: 0; background: linear-gradient(0deg, var(--pdd-secondary), transparent); }

        /* ============================================================
           ANIMATIONS TIMELINE (driven by class .play on body)
           ============================================================ */
        /* Phase 1: Entrance */
        body.splash-play .corner { opacity: 0.7; transition: opacity 0.6s ease 0.2s; }
        body.splash-play .glow-ring { opacity: 0.5; transition: opacity 0.7s ease 0.3s; }
        body.splash-play .glow-ring-inner { opacity: 0.7; transition: opacity 0.7s ease 0.4s; }

        /* Phase 2: Logo formation */
        body.splash-play .logo-svg-wrap {
            opacity: 1;
            transform: scale(1) rotate(0);
            transition: opacity 0.6s ease 0.7s, transform 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s;
        }
        body.splash-play .logo-svg-wrap .brand-outline {
            animation: draw 1.4s ease-in-out 0.9s forwards;
        }
        body.splash-play .logo-svg-wrap .brand-fill-yellow {
            animation: fill-in 0.4s ease 2.0s forwards;
        }
        body.splash-play .logo-svg-wrap .brand-fill-white {
            animation: fill-in 0.4s ease 2.2s forwards;
        }
        body.splash-play .logo-svg-wrap .brand-fill-blue {
            animation: fill-in 0.4s ease 2.4s forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes fill-in { to { opacity: 1; } }

        body.splash-play .logo-reflection { opacity: 0.6; transition: opacity 0.6s ease 1.6s; }

        /* Phase 3: Pulse + text + loading */
        body.splash-play .brand-text {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.7s ease 2.0s, transform 0.7s ease 2.0s;
        }
        body.splash-play .loading-wrap {
            opacity: 1;
            transition: opacity 0.5s ease 2.3s;
        }
        body.splash-play .loading-bar {
            animation: load 1.6s cubic-bezier(0.65, 0, 0.35, 1) 2.4s forwards;
        }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* Pulse waves */
        body.splash-play .pulse-wave {
            animation: pulse-out 1.4s ease-out 2.6s infinite;
        }
        body.splash-play .pulse-wave:nth-child(2) { animation-delay: 2.8s; }
        body.splash-play .pulse-wave:nth-child(3) { animation-delay: 3.0s; }
        @keyframes pulse-out {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(0.6); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.2); }
        }

        /* Light sweep */
        body.splash-play .light-sweep {
            opacity: 1;
            animation: sweep 1.0s cubic-bezier(0.65, 0, 0.35, 1) 2.5s forwards;
        }
        @keyframes sweep {
            0% { left: -120%; opacity: 0; }
            20% { opacity: 1; }
            100% { left: 120%; opacity: 0; }
        }

        /* Phase 4: Exit (triggered by class .dismissing) */
        #splash-screen.dismissing .logo-svg-wrap { transform: scale(1.15); transition: transform 0.5s ease; }
        #splash-screen.dismissing .brand-text,
        #splash-screen.dismissing .loading-wrap { opacity: 0; transform: translateY(-15px); transition: all 0.4s ease; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 576px) {
            .logo-stage { width: 170px; height: 170px; }
            .logo-svg-wrap { width: 120px; height: 120px; }
            .glow-ring { inset: -18px; }
            .pulse-wave { width: 150px; height: 150px; }
            .brand-name { font-size: 1.75rem; }
            .brand-tagline { font-size: 0.65rem; letter-spacing: 3px; }
            .loading-wrap { width: 180px; }
            .corner { width: 22px; height: 22px; }
            .corner.tl, .corner.tr { top: 16px; }
            .corner.bl, .corner.br { bottom: 16px; }
            .corner.tl, .corner.bl { left: 16px; }
            .corner.tr, .corner.br { right: 16px; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            #splash-screen::before, .glow-ring, .glow-ring-inner { animation: none !important; }
            #splash-screen, #splash-screen * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <!-- ===== Splash Screen ===== -->
    <div id="splash-screen">
        <canvas id="splash-particles"></canvas>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="logo-stage">
            <div class="glow-ring"></div>
            <!--<div class="glow-ring-inner"></div>-->

            <div class="pulse-wave"></div>
            <div class="pulse-wave"></div>
            <div class="pulse-wave"></div>

            <div class="logo-svg-wrap">
                <svg width="160" height="160" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Black outline shape (drawn first) -->
                    <path class="brand-outline" d="M31 23H82C91.94 23 100 31.06 100 41V82H83V56C83 65.94 74.94 74 65 74H31V23Z" />
                    <!-- Yellow top -->
                    <path class="brand-fill-yellow" d="M31 23H82C91.94 23 100 31.06 100 41C100 50.94 91.94 56 82 56H31V23Z" />
                    <!-- Blue bottom -->
                    <path class="brand-fill-blue" d="M31 74H83V101H31C21.06 101 13 93.94 13 84C13 78.48 21.06 74 31 74Z" />
                    <!-- Inner white -->
                    <path class="brand-fill-white" d="M31 74H65C74.94 74 83 65.94 83 56V74" />
                </svg>
                <div class="light-sweep"></div>
            </div>
            <div class="logo-reflection"></div>
        </div>

        <div class="brand-text">
            <h1 class="brand-name">طب پرداز</h1>
            <p class="brand-tagline">Software Engineering</p>
        </div>

        <div class="loading-wrap">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- ===== Blazor App Root ===== -->
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script>
        /* ============================================================
           SPLASH ENGINE
           ============================================================ */
        (function () {
            // Particle system
            const canvas = document.getElementById('splash-particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const dpr = window.devicePixelRatio || 1;
            const count = window.innerWidth < 576 ? 35 : 70;

            function resize() {
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
            function spawn() {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.4 * dpr,
                        vy: (Math.random() - 0.5) * 0.4 * dpr,
                        r: (Math.random() * 1.6 + 0.4) * dpr,
                        a: Math.random() * 0.6 + 0.2,
                        hue: Math.random() < 0.7 ? 215 : 38
                    });
                }
            }
            function draw() {
                if (!canvas.isConnected) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    const color = p.hue === 215
                        ? `rgba(13, 110, 253, ${p.a})`
                        : `rgba(255, 176, 32, ${p.a})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            resize();
            spawn();
            draw();
            window.addEventListener('resize', () => { resize(); spawn(); });

            // Trigger animation timeline
            requestAnimationFrame(() => {
                document.body.classList.add('splash-play');
            });

            // Dismiss splash (called from Blazor)
            window.dismissSplash = function () {
                const el = document.getElementById('splash-screen');
                if (!el || el.classList.contains('hide')) return;
                el.classList.add('dismissing');
                document.body.style.overflow = 'auto';
                setTimeout(() => {
                    el.classList.add('hide');
                    setTimeout(() => el.remove(), 700);
                }, 600);
            };

            // Auto-fallback after 6s
            window.addEventListener('load', () => {
                setTimeout(() => {
                    const el = document.getElementById('splash-screen');
                    if (el && !el.classList.contains('hide')) window.dismissSplash();
                }, 6000);
            });

            // Extra safety: force dismiss after 8s regardless
            setTimeout(() => {
                const el = document.getElementById('splash-screen');
                if (el) {
                    el.classList.add('hide');
                    document.body.style.overflow = 'auto';
                    setTimeout(() => el.remove(), 200);
                }
            }, 8000);
        })();
    </script>

    <script src="lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/crypto-js.min.js"></script>
    <script src="lib/gsap/gsap.min.js"></script>
    <script src="lib/gsap/ScrollTrigger.min.js"></script>
    <script src="lib/gsap/TextPlugin.min.js"></script>
    <script src="lib/lenis/lenis.min.js"></script>
    <script src="js/gsap-animations.js"></script>
    <script src="js/interop.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start({
            logLevel: 1,
            debug: false
        }).then(function () {
            console.log('Blazor started successfully');
        }).catch(function (error) {
            console.error('Blazor failed to start:', error);
            // Safety: dismiss splash even if Blazor fails
            if (window.dismissSplash) window.dismissSplash();
        });
    </script>
</body>
</html>

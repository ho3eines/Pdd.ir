<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pdd.ir | شرکت نرم‌افزاری</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/splash.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Pdd.ir.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>

<body>
    <!-- Splash Screen Overlay -->
    <div class="splash-overlay" id="splash">
        <div class="splash-bg"></div>
        <canvas class="splash-particles"></canvas>
        
        <div class="splash-logo-container">
            <div class="splash-logo">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#0D6EFD;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0A58CA;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#FFB020;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#FF8A00;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <path id="logo-blue"
                        d="M40 160 Q40 120, 60 100 Q80 80, 100 80 L100 60 Q100 40, 80 40 L60 40 Q40 40, 40 60 L40 160 Z"
                        fill="url(#blueGrad)" filter="url(#glow)" opacity="0"/>
                    <path id="logo-orange"
                        d="M100 80 Q120 80, 140 100 Q160 120, 160 160 L160 60 Q160 40, 140 40 L120 40 Q100 40, 100 60 L100 80 Z"
                        fill="url(#orangeGrad)" filter="url(#glow)" opacity="0"/>
                    <path id="logo-accent"
                        d="M70 90 Q90 70, 110 90 Q130 110, 150 90"
                        stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0"/>
                </svg>
            </div>
            <div class="logo-glow"></div>
            <div class="pulse-ring"></div>
        </div>
        
        <div class="splash-company"><span>Pdd</span>.ir</div>
        <div class="splash-tagline">شرکت مهندسی نرم‌افزار</div>
        
        <div class="splash-loading">
            <div class="splash-loading-bar"></div>
        </div>
        
        <button class="splash-skip" onclick="window.dismissSplash()">رد شدن ›</button>
        
        <div class="light-sweep"></div>
    </div>

    <!-- Blazor App -->
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/splash.js"></script>
    <script src="js/interop.js"></script>
    <script src="js/animations.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
